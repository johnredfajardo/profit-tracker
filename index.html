<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="description" content="Track profit by recording income and expenses. Local-first, works offline." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>Profit Tracker</title>

    <!-- Apply persisted theme before paint to avoid a flash of the wrong theme. -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('profit-tracker-settings');
          var theme = raw ? JSON.parse(raw)?.state?.theme : 'system';
          var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = theme === 'dark' || (theme !== 'light' && systemDark);
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
